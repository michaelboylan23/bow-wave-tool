trigger:
  tags:
    include:
      - v*

pool:
  vmImage: windows-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: 22.x
    displayName: Install Node.js

  - script: npm ci
    displayName: Install dependencies

  - script: npm run electron:build
    displayName: Build portable EXE
    env:
      VITE_AZDO_PAT: $(VITE_AZDO_PAT)
      VITE_AZDO_ORG: $(VITE_AZDO_ORG)
      VITE_AZDO_PROJECT: $(VITE_AZDO_PROJECT)

  - publish: release
    artifact: bow-wave-portable
    displayName: Publish portable EXE
