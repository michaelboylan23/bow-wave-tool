trigger:
  tags:
    include:
      - v*

pool:
  vmImage: windows-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: 22.x
    displayName: Install Node.js

  - script: npm ci
    displayName: Install dependencies

  - script: npm run electron:build
    displayName: Build portable EXE
    env:
      VITE_GITHUB_TOKEN: $(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)
      VITE_USAGE_GIST_ID: $(061b06d1f1a01e5747d17f050f5cdea3)
      VITE_GITHUB_REPO: $(michaelboylan23/bow-wave-tool)

  - publish: release
    artifact: bow-wave-portable
    displayName: Publish portable EXE
